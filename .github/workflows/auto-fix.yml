          reason = os.environ.get("TRIGGER_REASON", "(see run)")
          lifetime_count = int(os.environ.get("LIFETIME_COUNT", "0") or "0")
          manual_review = os.environ.get("MANUAL_REVIEW", "False").lower() == "true"
          daily_run_url = os.environ["DAILY_RUN_URL"]
          run_url = os.environ["RUN_URL"]
          date_str = datetime.now(timezone.utc).strftime("%b %-d, %Y")

          lines = [
              f"🚨 Auto-fix Exhausted — {workflow} — {date_str}",
              "",
              f"Issue: {reason}",
              "All 3 attempts failed",
              f"Total fix attempts ever for this issue: {lifetime_count}",
              "Status: Continuing to iterate — next attempt scheduled on next workflow run",
          ]
          if manual_review:
              lines.append("")
              lines.append(f"⚠️ Action required: lifetime_count ({lifetime_count}) exceeds 10 — manual review strongly recommended")
          lines += ["", f"Failed run: {daily_run_url}", f"Auto-fix run: {run_url}"]
          print(json.dumps({"content": "\n".join(lines)}))
          PY
          )"

          response_file="$(mktemp)"
          http_status="$(curl --silent --show-error \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            --header "Content-Type: application/json" \
            --header "User-Agent: steam-discord-free-games-auto-fix/1.0" \
            --data "${payload}" \
            --request POST \
            "${DISCORD_HEALTH_MONITOR_WEBHOOK_URL}")"

          if [[ "${http_status}" =~ ^2[0-9][0-9]$ ]]; then
            echo "Max-attempts alert posted to Discord: HTTP ${http_status}"
          else
            echo "WARN: Discord notification failed: HTTP ${http_status}" >&2
            if [[ -s "${response_file}" ]]; then cat "${response_file}" >&2; fi
          fi
          rm -f "${response_file}"

      # ------------------------------------------------------------------ #
      # Commit health log state so it persists across runs.
      # ------------------------------------------------------------------ #
      - name: Save health log state
        if: steps.check.outputs.should_fix == 'true'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f data/health_monitor_log.json ]; then
            git add data/health_monitor_log.json
          fi
          if ! git diff --cached --quiet; then
            git commit -m "chore: update health monitor log"
            git stash --include-untracked || true
            git pull --rebase origin main
            git stash pop || true
            git push
          fi
