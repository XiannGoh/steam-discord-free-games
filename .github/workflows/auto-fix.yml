name: Auto Fix Loop

on:
  workflow_run:
    workflows: ["Steam Free Games", "Daily Game Picks Winners", "Gaming Library Daily Reminder", "Gaming Library Sync", "Weekly Scheduling Responses Sync"]
    types: [completed]

# Only one auto-fix may run at a time. Queue rather than cancel so no fix
# attempt is silently dropped.
concurrency:
  group: auto-fix-loop
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: read
  id-token: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout the repo so the artifact lands in the workspace and
      #    Claude has full repo context available for all fix attempts.
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v5

      # ------------------------------------------------------------------ #
      # 2. Download the daily_verification.json artifact from the triggering
      #    daily.yml run. continue-on-error so we still act on workflow
      #    failures even when the artifact was never written (e.g. the
      #    script crashed before export_verification_artifact ran).
      # ------------------------------------------------------------------ #
      - name: Download verification artifact
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: daily-verification-*
          merge-multiple: true
          path: artifacts/

      # ------------------------------------------------------------------ #
      # 3. Download the discord_verification.json artifact written by
      #    scripts/verify_discord_output.py in the triggering daily run.
      #    Separate step from the daily_verification download so each
      #    artifact type can fail independently without masking the other.
      # ------------------------------------------------------------------ #
      - name: Download Discord verification artifact
        id: download_discord
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: discord-verification-*
          merge-multiple: true
          path: artifacts/

      # ------------------------------------------------------------------ #
      # 4. Download gaming_library_verification.json artifact from the
      #    triggering gaming-library-daily run (absent for other workflows).
      # ------------------------------------------------------------------ #
      - name: Download gaming library verification artifact
        id: download_gaming_library
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: gaming-library-verification-*
          merge-multiple: true
          path: artifacts/

      # ------------------------------------------------------------------ #
      # 5. Download weekly_schedule_verification.json artifact from the
      #    triggering weekly-scheduling-bot run (absent for other workflows).
      # ------------------------------------------------------------------ #
      - name: Download weekly schedule verification artifact
        id: download_weekly_schedule
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: weekly-schedule-verification-*
          merge-multiple: true
          path: artifacts/

      # ------------------------------------------------------------------ #
      # 6. Download Discord snapshot artifacts so Claude Code can read
      #    the actual Discord output when diagnosing failures.
      # ------------------------------------------------------------------ #
      - name: Download Discord snapshot artifact
        id: download_snapshots
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: discord-snapshots-*
          merge-multiple: true
          path: artifacts/

      # ------------------------------------------------------------------ #
      # 7. Decide whether a fix is needed:
      #    - workflow concluded with failure, OR
      #    - any verification artifact reports pass: false
      # Sets should_fix and trigger_reason outputs.
      # ------------------------------------------------------------------ #
      - name: Evaluate fix trigger
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion="${{ github.event.workflow_run.conclusion }}"

          daily_pass="true"
          if [ -f artifacts/daily_verification.json ]; then
            daily_pass="$(python3 -c "
          import json, sys
          try:
              d = json.load(open('artifacts/daily_verification.json'))
              print(str(d.get('pass', True)).lower())
          except Exception as e:
              print('true')
              print(f'WARN: could not parse daily_verification.json: {e}', file=sys.stderr)
          ")"
          fi

          discord_pass="true"
          if [ -f artifacts/discord_verification.json ]; then
            discord_pass="$(python3 -c "
          import json, sys
          try:
              d = json.load(open('artifacts/discord_verification.json'))
              print(str(d.get('pass', True)).lower())
          except Exception as e:
              print('true')
              print(f'WARN: could not parse discord_verification.json: {e}', file=sys.stderr)
          ")"
          fi

          gaming_library_pass="true"
          if [ -f artifacts/gaming_library_verification.json ]; then
            gaming_library_pass="$(python3 -c "
          import json, sys
          try:
              d = json.load(open('artifacts/gaming_library_verification.json'))
              print(str(d.get('pass', True)).lower())
          except Exception as e:
              print('true')
              print(f'WARN: could not parse gaming_library_verification.json: {e}', file=sys.stderr)
          ")"
          fi

          weekly_schedule_pass="true"
          if [ -f artifacts/weekly_schedule_verification.json ]; then
            weekly_schedule_pass="$(python3 -c "
          import json, sys
          try:
              d = json.load(open('artifacts/weekly_schedule_verification.json'))
              print(str(d.get('pass', True)).lower())
          except Exception as e:
              print('true')
              print(f'WARN: could not parse weekly_schedule_verification.json: {e}', file=sys.stderr)
          ")"
          fi

          echo "Daily workflow conclusion: ${conclusion}"
          echo "daily_verification pass: ${daily_pass}"
          echo "discord_verification pass: ${discord_pass}"
          echo "gaming_library_verification pass: ${gaming_library_pass}"
          echo "weekly_schedule_verification pass: ${weekly_schedule_pass}"

          # When the workflow failed, try to identify the specific failing step
          # so Claude Code knows where to look first.
          failing_step=""
          if [ "$conclusion" = "failure" ]; then
            failing_step="$(gh api \
              "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs" \
              --jq '
                .jobs[]
                | select(.conclusion == "failure")
                | .steps[]
                | select(.conclusion == "failure")
                | "\(.name // \"unknown\")"
              ' 2>/dev/null | head -1 || true)"
            if [ -n "$failing_step" ]; then
              echo "Detected failing step: ${failing_step}"
            else
              echo "Could not determine failing step from API"
            fi
          fi

          # Count failing checks to enable post-fix regression detection
          pre_fix_fail_count=0
          [ "$daily_pass" = "false" ] && pre_fix_fail_count=$((pre_fix_fail_count + 1))
          [ "$discord_pass" = "false" ] && pre_fix_fail_count=$((pre_fix_fail_count + 1))
          [ "$gaming_library_pass" = "false" ] && pre_fix_fail_count=$((pre_fix_fail_count + 1))
          [ "$weekly_schedule_pass" = "false" ] && pre_fix_fail_count=$((pre_fix_fail_count + 1))
          echo "pre_fix_fail_count=${pre_fix_fail_count}" >> "$GITHUB_OUTPUT"

          triggering_workflow="${{ github.event.workflow_run.name }}"
          if [ "$conclusion" = "failure" ] || [ "$daily_pass" = "false" ] || [ "$discord_pass" = "false" ] || [ "$gaming_library_pass" = "false" ] || [ "$weekly_schedule_pass" = "false" ]; then
            echo "should_fix=true" >> "$GITHUB_OUTPUT"
            failing_step_part=""
            if [ -n "$failing_step" ]; then
              failing_step_part=", failing_step=${failing_step}"
            fi
            echo "trigger_reason=workflow=${triggering_workflow}, conclusion=${conclusion}, daily_pass=${daily_pass}, discord_pass=${discord_pass}, gaming_library_pass=${gaming_library_pass}, weekly_schedule_pass=${weekly_schedule_pass}${failing_step_part}" >> "$GITHUB_OUTPUT"
            echo "Fix needed — workflow=${triggering_workflow}, conclusion=${conclusion}, daily_pass=${daily_pass}, discord_pass=${discord_pass}, gaming_library_pass=${gaming_library_pass}, weekly_schedule_pass=${weekly_schedule_pass}${failing_step_part}."
          else
            echo "should_fix=false" >> "$GITHUB_OUTPUT"
            echo "No fix needed — workflow=${triggering_workflow}, conclusion=${conclusion}, daily_pass=${daily_pass}, discord_pass=${discord_pass}, gaming_library_pass=${gaming_library_pass}, weekly_schedule_pass=${weekly_schedule_pass}. Exiting."
          fi

      # ------------------------------------------------------------------ #
      # 6. Log the failure to health_monitor_log.json, detect recurrence,
      #    and post appropriate Discord notifications.
      # ------------------------------------------------------------------ #
      - name: Log failure and check recurrence
        id: health_log
        if: steps.check.outputs.should_fix == 'true'
        continue-on-error: true
        env:
          PYTHONPATH: .
        run: |
          pip install -r requirements.txt -q

          triggering_workflow="${{ github.event.workflow_run.name }}"
          trigger_reason="${{ steps.check.outputs.trigger_reason }}"

          # Derive issue_type from trigger_reason
          issue_type="workflow_execution_failed"
          if echo "$trigger_reason" | grep -q "discord_pass=false"; then
            issue_type="discord_verification_failed"
          elif echo "$trigger_reason" | grep -q "daily_pass=false"; then
            issue_type="daily_verification_failed"
          elif echo "$trigger_reason" | grep -q "gaming_library_pass=false"; then
            issue_type="gaming_library_verification_failed"
          elif echo "$trigger_reason" | grep -q "weekly_schedule_pass=false"; then
            issue_type="weekly_schedule_verification_failed"
          fi

          result="$(python3 scripts/update_health_log.py log-failure \
            --workflow "${triggering_workflow}" \
            --issue-type "${issue_type}" \
            --issue-description "${trigger_reason}" \
            --run-id "${{ github.event.workflow_run.id }}")"

          echo "health_log_result=${result}"
          failure_id="$(echo "$result" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['failure_id'])")"
          recurrence_count="$(echo "$result" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['recurrence_count'])")"
          is_recurring="$(echo "$result" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['is_recurring'])")"
          lifetime_count="$(echo "$result" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['lifetime_count'])")"
          manual_review="$(echo "$result" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['manual_review_recommended'])")"

          echo "failure_id=${failure_id}" >> "$GITHUB_OUTPUT"
          echo "recurrence_count=${recurrence_count}" >> "$GITHUB_OUTPUT"
          echo "is_recurring=${is_recurring}" >> "$GITHUB_OUTPUT"
          echo "lifetime_count=${lifetime_count}" >> "$GITHUB_OUTPUT"
          echo "issue_type=${issue_type}" >> "$GITHUB_OUTPUT"
          echo "manual_review=${manual_review}" >> "$GITHUB_OUTPUT"

      - name: Post failure detection to Discord
        if: steps.check.outputs.should_fix == 'true'
        continue-on-error: true
        env:
          DISCORD_HEALTH_MONITOR_WEBHOOK_URL: ${{ secrets.DISCORD_HEALTH_MONITOR_WEBHOOK_URL }}
          TRIGGER_REASON: ${{ steps.check.outputs.trigger_reason }}
          TRIGGERING_WORKFLOW: ${{ github.event.workflow_run.name }}
          RECURRENCE_COUNT: ${{ steps.health_log.outputs.recurrence_count }}
          IS_RECURRING: ${{ steps.health_log.outputs.is_recurring }}
          RUN_DATE: ${{ github.event.workflow_run.created_at }}
        run: |
          payload="$(python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone

          workflow = os.environ.get("TRIGGERING_WORKFLOW", "unknown")
          reason = os.environ.get("TRIGGER_REASON", "")
          recurrence_count = int(os.environ.get("RECURRENCE_COUNT", "0") or "0")
          is_recurring = os.environ.get("IS_RECURRING", "False").lower() == "true"
          date_str = datetime.now(timezone.utc).strftime("%b %-d, %Y")

          content_lines = [
              f"🔴 Failure Detected — {workflow} — {date_str}",
              "",
              f"Issue: {reason}",
              "Attempt: 1 of 3",
              "Status: Auto-fix triggered",
              f"Fix branch: fix/auto-fix-${{ github.event.workflow_run.id }}-1",
              f"Previous occurrences in last 7 days: {recurrence_count}",
          ]
          if is_recurring:
              content_lines.append("")
              content_lines.append(f"⚠️ Recurring issue — has failed {recurrence_count + 1} times in 7 days")

          print(json.dumps({"content": "\n".join(content_lines)}))
          PY
          )"

          response_file="$(mktemp)"
          http_status="$(curl --silent --show-error \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            --header "Content-Type: application/json" \
            --header "User-Agent: steam-discord-free-games-auto-fix/1.0" \
            --data "${payload}" \
            --request POST \
            "${DISCORD_HEALTH_MONITOR_WEBHOOK_URL}")"

          if [[ "${http_status}" =~ ^2[0-9][0-9]$ ]]; then
            echo "Discord failure-detected notification posted: HTTP ${http_status}"
          else
            echo "WARN: Discord notification failed: HTTP ${http_status}" >&2
            if [[ -s "${response_file}" ]]; then cat "${response_file}" >&2; fi
          fi
          rm -f "${response_file}"

      # ------------------------------------------------------------------ #
      # Shared prompt template (inlined per-step — GitHub Actions does not
      # support YAML anchors, so the prompt is repeated with the attempt
      # number changed). All attempts use claude-sonnet-4-6.
      # ------------------------------------------------------------------ #

      - name: Fix attempt 1 of 3
        id: fix_1
        if: steps.check.outputs.should_fix == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-sonnet-4-6 --max-turns 10'
          prompt: |
            This is auto-fix attempt 1 of 3.

            The daily Steam Free Games Discord workflow has failed or produced an
            invalid verification artifact.

            Trigger context: ${{ steps.check.outputs.trigger_reason }}

            BEFORE FIXING: Read data/health_monitor_log.json and check if this
            issue_type (${{ steps.health_log.outputs.issue_type }}) has appeared
            before. If is_recurring is true (${{ steps.health_log.outputs.is_recurring }}),
            do not just fix the symptom — investigate and fix the root cause.
            Recurrence count in last 7 days: ${{ steps.health_log.outputs.recurrence_count }}

            If the file artifacts/daily_verification.json exists in the workspace,
            read it to understand exactly what failed (intro_present, section_header_counts,
            duplicate_item_keys, footer_present, pass, etc.).

            Your task:
            1. Read CLAUDE.md first and follow all rules there.
            2. Identify the root cause of the failure from the verification artifact
               and from the relevant source files (main.py, discord_api.py,
               daily_section_config.py, state_utils.py, evening_winners.py).
            3. If the failure was in a git push or git pull --rebase step, check the
               save state pattern in the workflow file. The correct pattern is:
                 git stash --include-untracked || true
                 git pull --rebase origin main
                 git stash pop || true
               If this stash pattern is missing, add it and apply the same fix to all
               other workflows that use git pull --rebase.
            4. Fix only the root cause. Do not refactor unrelated code.
            5. Create a new branch named fix/auto-fix-${{ github.event.workflow_run.id }}-1
               branched from main.
            6. Commit your changes with a message that explains what failed and
               what you changed.
            7. Open a pull request against main with a clear description of the
               failure and the fix.

            IMPORTANT — 403 Forbidden errors are NOT code bugs: If the failure was
            caused by a Discord 403 Forbidden response (e.g. the bot is missing
            Send Messages, Add Reactions, Read Message History, or Manage Messages
            permissions in a channel), this is a Discord server configuration issue,
            not a code defect. Do NOT open a code PR. Instead, post a message to
            the xiann-gpt-bot-health-monitor Discord channel (using the
            DISCORD_HEALTH_MONITOR_WEBHOOK_URL secret) explaining which channel and
            permission is missing, then exit without making any code changes.

            Important: use model claude-sonnet-4-6, not Opus.

      - name: Auto-merge PR from attempt 1
        id: merge_1
        if: steps.fix_1.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number="$(gh pr list \
            --head "fix/auto-fix-${{ github.event.workflow_run.id }}-1" \
            --json number \
            --jq '.[0].number')"

          if [ -z "$pr_number" ]; then
            echo "No PR found for branch fix/auto-fix-${{ github.event.workflow_run.id }}-1"
            exit 1
          fi

          echo "Found PR #${pr_number} — enabling auto-merge"
          gh pr merge "${pr_number}" --squash --auto

      - name: Update health log — attempt 1 success
        if: steps.fix_1.outcome == 'success' && steps.health_log.outputs.failure_id != ''
        continue-on-error: true
        env:
          PYTHONPATH: .
        run: |
          pr_number="$(gh pr list \
            --head "fix/auto-fix-${{ github.event.workflow_run.id }}-1" \
            --json number --jq '.[0].number' 2>/dev/null || echo "")"
          python3 scripts/update_health_log.py update-outcome \
            --failure-id "${{ steps.health_log.outputs.failure_id }}" \
            --outcome success \
            --branch "fix/auto-fix-${{ github.event.workflow_run.id }}-1" \
            --attempt 1 \
            ${pr_number:+--pr-number "$pr_number"}

      - name: Notify Discord — attempt 1 success
        if: steps.fix_1.outcome == 'success' && steps.health_log.outputs.failure_id != ''
        continue-on-error: true
        env:
          DISCORD_HEALTH_MONITOR_WEBHOOK_URL: ${{ secrets.DISCORD_HEALTH_MONITOR_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload="$(python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          date_str = datetime.now(timezone.utc).strftime("%b %d, %Y")
          workflow = os.environ.get("WORKFLOW_NAME", "Unknown")
          run_url = os.environ.get("RUN_URL", "")
          content = (
              f"🟢 Auto-fix Succeeded — {workflow} — {date_str}\n\n"
              f"Discord output: ✅ Validated\n"
              f"Run: {run_url}"
          )
          print(json.dumps({"content": content}))
          PY
          )"

          response_file="$(mktemp)"
          http_status="$(curl --silent --show-error \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            --header "Content-Type: application/json" \
            --header "User-Agent: steam-discord-free-games-auto-fix/1.0" \
            --data "${payload}" \
            --request POST \
            "${DISCORD_HEALTH_MONITOR_WEBHOOK_URL}")"

          if [[ "${http_status}" =~ ^2[0-9][0-9]$ ]]; then
            echo "Auto-fix success notification posted: HTTP ${http_status}"
          else
            echo "WARN: Discord notification failed: HTTP ${http_status}" >&2
            if [[ -s "${response_file}" ]]; then cat "${response_file}" >&2; fi
          fi
          rm -f "${response_file}"

      - name: Verify post-fix and rollback if worse — attempt 1
        id: verify_rollback_1
        if: steps.fix_1.outcome == 'success' && steps.merge_1.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          DISCORD_HEALTH_MONITOR_WEBHOOK_URL: ${{ secrets.DISCORD_HEALTH_MONITOR_WEBHOOK_URL }}
          TRIGGERING_WORKFLOW: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PRE_FIX_FAIL_COUNT: ${{ steps.check.outputs.pre_fix_fail_count }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          triggering_workflow="${TRIGGERING_WORKFLOW}"
          pr_branch="fix/auto-fix-${WORKFLOW_RUN_ID}-1"
          pr_number="$(gh pr list --head "${pr_branch}" --state merged --json number --jq '.[0].number' 2>/dev/null || echo "")"
          merge_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "Polling for post-fix run of '${triggering_workflow}' (up to 5 minutes)..."
          new_run_id=""
          for attempt in $(seq 1 30); do
            new_run_id="$(gh run list \
              --workflow "${triggering_workflow}" \
              --status completed \
              --json databaseId,createdAt \
              --jq "[.[] | select(.createdAt >= \"${merge_time}\")] | .[0].databaseId" \
              2>/dev/null || echo "")"
            [ -n "$new_run_id" ] && [ "$new_run_id" != "null" ] && break
            echo "No new completed run yet (attempt ${attempt}/30); waiting 10s..."
            sleep 10
          done

          if [ -z "$new_run_id" ] || [ "$new_run_id" = "null" ]; then
            echo "No post-fix run found within 5 minutes; skipping rollback check"
            exit 0
          fi
          echo "Found post-fix run: ${new_run_id}"

          mkdir -p post_fix_artifacts_1
          gh run download "${new_run_id}" --pattern "discord-verification-*" -D post_fix_artifacts_1/ 2>/dev/null || true
          gh run download "${new_run_id}" --pattern "daily-verification-*" -D post_fix_artifacts_1/ 2>/dev/null || true
          gh run download "${new_run_id}" --pattern "gaming-library-verification-*" -D post_fix_artifacts_1/ 2>/dev/null || true
          gh run download "${new_run_id}" --pattern "weekly-schedule-verification-*" -D post_fix_artifacts_1/ 2>/dev/null || true

          new_fail_count=0
          for artifact in \
            post_fix_artifacts_1/discord_verification.json \
            post_fix_artifacts_1/daily_verification.json \
            post_fix_artifacts_1/gaming_library_verification.json \
            post_fix_artifacts_1/weekly_schedule_verification.json; do
            if [ -f "$artifact" ]; then
              pass_val="$(python3 -c "
          import json
          try:
              d = json.load(open('$artifact'))
              print(str(d.get('pass', True)).lower())
          except:
              print('true')
          " 2>/dev/null || echo "true")"
              [ "$pass_val" = "false" ] && new_fail_count=$((new_fail_count + 1))
            fi
          done

          pre_fix_fail_count="${PRE_FIX_FAIL_COUNT:-0}"
          echo "Pre-fix fail count: ${pre_fix_fail_count} | Post-fix fail count: ${new_fail_count}"

          post_discord() {
            local content="$1"
            curl --silent --show-error \
              --header "Content-Type: application/json" \
              --header "User-Agent: steam-discord-free-games-auto-fix/1.0" \
              --data "$(python3 -c "import json,sys; print(json.dumps({'content': sys.argv[1]}))" "$content")" \
              --request POST "${DISCORD_HEALTH_MONITOR_WEBHOOK_URL}" >/dev/null || true
          }

          date_str="$(python3 -c "from datetime import datetime, timezone; print(datetime.now(timezone.utc).strftime('%b %d, %Y'))")"

          if [ "$new_fail_count" -eq 0 ]; then
            echo "Post-fix verification passed — no rollback needed"
          elif [ "$new_fail_count" -gt "$pre_fix_fail_count" ]; then
            echo "Post-fix verification WORSE — reverting"
            merge_commit="$(gh pr view "${pr_number}" --json mergeCommit --jq '.mergeCommit.oid' 2>/dev/null || echo "")"
            if [ -n "$merge_commit" ] && [ "$merge_commit" != "null" ]; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git pull origin main
              revert_branch="revert/auto-fix-${WORKFLOW_RUN_ID}-1"
              git checkout -b "${revert_branch}"
              git revert --no-edit "${merge_commit}" || true
              git push origin "${revert_branch}" || true
              gh pr create \
                --title "revert: auto-fix attempt 1 made things worse" \
                --body "Automatic revert: post-fix verification showed ${new_fail_count} failures vs ${pre_fix_fail_count} before the fix." \
                --base main --head "${revert_branch}" || true
              revert_pr="$(gh pr list --head "${revert_branch}" --json number --jq '.[0].number' 2>/dev/null || echo "")"
              [ -n "$revert_pr" ] && gh pr merge "${revert_pr}" --squash --auto || true
            fi
            post_discord "🔴 Auto-fix Reverted — ${triggering_workflow} — ${date_str}

          Reason: Post-fix verification showed more failures
          Reverted PR: #${pr_number}
          Run: ${RUN_URL}"
          else
            echo "Post-fix verification still failing but not worse — inconclusive"
            post_discord "🟡 Auto-fix Inconclusive — ${triggering_workflow} — ${date_str}

          Fix merged but verification still failing
          Next attempt will try a different approach
