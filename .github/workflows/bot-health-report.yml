name: Bot Health Report

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC only (no timezone/DST support).
    # 03:10 UTC is ~11:10 PM New York during EDT, ~10:10 PM during EST.
    - cron: "10 3 * * *"

permissions:
  actions: read
  contents: read

jobs:
  post-health-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Collect workflow run status
        id: collect-workflows
        uses: actions/github-script@v7
        with:
          script: |
            const workflows = [
              { file: "weekly-scheduling-bot.yml", name: "Weekly Scheduling Bot", staleHours: 192 },
              { file: "weekly-scheduling-responses-sync.yml", name: "Weekly Scheduling Responses Sync", staleHours: 6 },
              { file: "daily.yml", name: "Daily Steam Picks", staleHours: 30 },
              { file: "evening-winners.yml", name: "Evening Winners", staleHours: 30 },
            ];

            const output = [];
            for (const workflow of workflows) {
              const response = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflow.file,
                per_page: 1,
                exclude_pull_requests: true,
              });
              output.push({
                ...workflow,
                run: response.data.workflow_runs[0] || null,
              });
            }

            core.setOutput("workflows", JSON.stringify(output));

      - name: Build daily health report
        id: build-report
        env:
          WORKFLOW_RUNS_JSON: ${{ steps.collect-workflows.outputs.workflows }}
        run: |
          printf '%s' "${WORKFLOW_RUNS_JSON}" > workflow-runs.json
          python scripts/build_daily_health_report.py --workflow-runs-json workflow-runs.json > health-report.txt
          {
            echo "content<<EOF"
            cat health-report.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post health report to Discord
        if: ${{ env.DISCORD_HEALTH_MONITOR_WEBHOOK_URL != '' }}
        env:
          DISCORD_HEALTH_MONITOR_WEBHOOK_URL: ${{ secrets.DISCORD_HEALTH_MONITOR_WEBHOOK_URL }}
          HEALTH_REPORT_CONTENT: ${{ steps.build-report.outputs.content }}
        run: |
          payload="$(python - <<'PY'
          import json
          import os
          print(json.dumps({"content": os.environ["HEALTH_REPORT_CONTENT"]}))
          PY
          )"

          response_file="$(mktemp)"
          http_status="$(curl --silent --show-error \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            --header "Content-Type: application/json" \
            --header "User-Agent: steam-discord-free-games-health-monitor/1.0" \
            --data "${payload}" \
            --request POST \
            "${DISCORD_HEALTH_MONITOR_WEBHOOK_URL}")"

          if [[ "${http_status}" =~ ^2[0-9][0-9]$ ]]; then
            echo "Discord webhook POST succeeded: HTTP ${http_status}"
          else
            echo "Discord webhook POST failed: HTTP ${http_status}" >&2
            if [[ -s "${response_file}" ]]; then
              cat "${response_file}" >&2
            fi
            rm -f "${response_file}"
            exit 1
          fi

          rm -f "${response_file}"
