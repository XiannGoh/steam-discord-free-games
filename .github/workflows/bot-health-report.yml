name: Bot Health Report

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC only (no timezone/DST support).
    # 03:00 UTC is ~11:00 PM New York during EDT, ~10:00 PM during EST.
    - cron: "0 3 * * *"

permissions:
  actions: read
  contents: read

jobs:
  post-health-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Find latest daily.yml run ID
        id: find-daily-run
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "daily.yml",
              per_page: 5,
              exclude_pull_requests: true,
            });
            const run = (runs.data.workflow_runs || []).find(r => r.status === "completed");
            if (!run) { core.warning("No completed daily.yml run found"); return; }
            core.setOutput("run_id", String(run.id));

      - name: Download state sanity artifact
        id: download-state-sanity
        continue-on-error: true
        if: steps.find-daily-run.outputs.run_id != ''
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ steps.find-daily-run.outputs.run_id }}
          pattern: state-sanity-*
          merge-multiple: true

      - name: Collect workflow run status
        id: collect-workflows
        uses: actions/github-script@v7
        with:
          script: |
            const workflows = [
              { file: "weekly-scheduling-bot.yml", name: "Weekly Scheduling Bot", staleHours: 168 },
              { file: "weekly-scheduling-responses-sync.yml", name: "Weekly Scheduling Responses Sync", staleHours: 6 },
              { file: "daily.yml", name: "Daily Steam Picks", staleHours: 20 },
              { file: "evening-winners.yml", name: "Evening Winners", staleHours: 12 },
              { file: "gaming-library-daily.yml", name: "Gaming Library Daily Reminder", staleHours: 20 },
              { file: "gaming-library-sync.yml", name: "Gaming Library Sync", staleHours: 4 },
            ];

            const output = [];
            for (const workflow of workflows) {
              const response = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflow.file,
                per_page: 20,
                exclude_pull_requests: true,
              });
              const runs = response.data.workflow_runs || [];
              output.push({
                ...workflow,
                run: runs[0] || null,
                recentRuns: runs.slice(0, 20).map((run) => ({
                  id: run.id,
                  event: run.event,
                  status: run.status,
                  conclusion: run.conclusion,
                  created_at: run.created_at,
                  updated_at: run.updated_at,
                  run_started_at: run.run_started_at,
                  html_url: run.html_url,
                })),
              });
            }

            core.setOutput("workflows", JSON.stringify(output));

      - name: Fetch GitHub Actions billing
        id: actions-billing
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api /users/${{ github.repository_owner }}/settings/billing/actions \
            > actions-billing.json 2>/dev/null \
            || echo '{}' > actions-billing.json

      - name: Build daily health report
        id: build-report
        env:
          WORKFLOW_RUNS_JSON: ${{ steps.collect-workflows.outputs.workflows }}
        run: |
          printf '%s' "${WORKFLOW_RUNS_JSON}" > workflow-runs.json
          python scripts/build_daily_health_report.py \
            --workflow-runs-json workflow-runs.json \
            --schedule-diagnostics-out workflow-schedule-diagnostics.json \
            --actions-billing-json actions-billing.json \
            > health-report.txt
          {
            echo "content<<EOF"
            cat health-report.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload scheduling diagnostics artifact
        uses: actions/upload-artifact@v4
        with:
          name: workflow-schedule-diagnostics
          path: workflow-schedule-diagnostics.json

      - name: Post health report to Discord
        if: ${{ env.DISCORD_HEALTH_MONITOR_WEBHOOK_URL != '' }}
        env:
          DISCORD_HEALTH_MONITOR_WEBHOOK_URL: ${{ secrets.DISCORD_HEALTH_MONITOR_WEBHOOK_URL }}
          HEALTH_REPORT_CONTENT: ${{ steps.build-report.outputs.content }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          from discord_api import split_discord_content

          webhook = os.environ["DISCORD_HEALTH_MONITOR_WEBHOOK_URL"]
          report = os.environ["HEALTH_REPORT_CONTENT"]
          chunks = split_discord_content(report)

          if len(chunks) > 1:
              # Prefixes are added after chunking, so reserve room for them and
              # re-chunk until every labeled chunk stays within Discord's 2000-char limit.
              while True:
                  total_chunks = len(chunks)
                  max_prefix_len = len(f"📋 Bot Health Report ({total_chunks}/{total_chunks})\n")
                  reserved_hard_limit = 2000 - max_prefix_len
                  if reserved_hard_limit <= 0:
                      raise RuntimeError("Health report chunk label unexpectedly exceeds Discord hard limit")

                  reserved_target_limit = min(1900, reserved_hard_limit)
                  rechunked = split_discord_content(
                      report,
                      target_limit=reserved_target_limit,
                      hard_limit=reserved_hard_limit,
                  )
                  if len(rechunked) == total_chunks:
                      chunks = rechunked
                      break
                  chunks = rechunked

              labeled_chunks = []
              total_chunks = len(chunks)
              for idx, chunk in enumerate(chunks, start=1):
                  prefix = f"📋 Bot Health Report ({idx}/{total_chunks})\n"
                  labeled_chunks.append(f"{prefix}{chunk}")
              chunks = labeled_chunks

          for idx, chunk in enumerate(chunks, start=1):
              payload = json.dumps({"content": chunk})
              result = subprocess.run(
                  [
                      "curl",
                      "--silent",
                      "--show-error",
                      "--output",
                      "/tmp/discord-health-response.txt",
                      "--write-out",
                      "%{http_code}",
                      "--header",
                      "Content-Type: application/json",
                      "--header",
                      "User-Agent: steam-discord-free-games-health-monitor/1.0",
                      "--data",
                      payload,
                      "--request",
                      "POST",
                      webhook,
                  ],
                  check=False,
                  text=True,
                  capture_output=True,
              )
              http_status = (result.stdout or "").strip()
              if http_status.startswith("2"):
                  print(f"Discord webhook POST chunk {idx}/{len(chunks)} succeeded: HTTP {http_status}")
                  continue

              print(f"Discord webhook POST chunk {idx}/{len(chunks)} failed: HTTP {http_status}", file=sys.stderr)
              try:
                  with open("/tmp/discord-health-response.txt", encoding="utf-8") as response_file:
                      response_body = response_file.read()
                  if response_body.strip():
                      print(response_body, file=sys.stderr)
              except OSError:
                  pass
              if result.stderr:
                  print(result.stderr, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Notify Discord health monitor on failure
        if: ${{ failure() && env.DISCORD_HEALTH_MONITOR_WEBHOOK_URL != '' }}
        env:
          DISCORD_HEALTH_MONITOR_WEBHOOK_URL: ${{ secrets.DISCORD_HEALTH_MONITOR_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.workflow }}
          JOB_NAME: post-health-report
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload="$(python - <<'PY'
          import json
          import os

          print(json.dumps({
              "content": (
                  "🔴 XiannGPT Bot Failure\n\n"
                  f"Workflow: {os.environ['WORKFLOW_NAME']}\n"
                  f"Job: {os.environ['JOB_NAME']}\n"
                  "Status: failed\n"
                  f"Run: {os.environ['RUN_URL']}"
              )
          }))
          PY
          )"

          response_file="$(mktemp)"
          http_status="$(curl --silent --show-error \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            --header "Content-Type: application/json" \
            --header "User-Agent: steam-discord-free-games-health-monitor/1.0" \
            --data "${payload}" \
            --request POST \
            "${DISCORD_HEALTH_MONITOR_WEBHOOK_URL}")"

          if [[ "${http_status}" =~ ^2[0-9][0-9]$ ]]; then
            echo "Discord webhook POST succeeded: HTTP ${http_status}"
          else
            echo "Discord webhook POST failed: HTTP ${http_status}" >&2
            if [[ -s "${response_file}" ]]; then
              cat "${response_file}" >&2
            fi
            rm -f "${response_file}"
            exit 1
          fi

          rm -f "${response_file}"
