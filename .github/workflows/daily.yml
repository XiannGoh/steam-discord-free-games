name: Steam Free Games

on:
  workflow_dispatch:
  schedule:
    # 10:20 AM New York (EDT) = 14:20 UTC
    - cron: "20 14 * * *"

    # 5:45 PM New York (EDT) = 21:45 UTC
    - cron: "45 21 * * *"

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run Steam script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Save updated state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add seen_ids.json page_state.json instagram_seen.json

          git diff --cached --quiet || git commit -m "Update bot state"
          git push
