name: Daily Game Picks Winners

on:
  workflow_dispatch:
    inputs:
      winners_date_utc:
        description: "Optional UTC date key (YYYY-MM-DD) for manual winners rerun"
        required: false
        type: string
  schedule:
    # GitHub Actions cron uses UTC only (no timezone/DST support).
    # This runs at 23:00 UTC year-round: 7:00 PM in New York during EDT, 6:00 PM during EST.
    - cron: "0 23 * * *"

permissions:
  contents: read

jobs:
  run-evening-winners:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run evening winners script
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_DAILY_PICKS_CHANNEL_ID: ${{ secrets.DISCORD_DAILY_PICKS_CHANNEL_ID }}
          DISCORD_WINNERS_CHANNEL_ID: ${{ secrets.DISCORD_WINNERS_CHANNEL_ID }}
          WINNERS_DATE_UTC: ${{ inputs.winners_date_utc }}
        run: python evening_winners.py

      - name: Notify Discord on failure (optional)
        if: ${{ failure() && secrets.DISCORD_FAILURE_WEBHOOK_URL != '' }}
        env:
          DISCORD_FAILURE_WEBHOOK_URL: ${{ secrets.DISCORD_FAILURE_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.workflow }}
          JOB_NAME: run-evening-winners
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WINNERS_DATE_UTC: ${{ inputs.winners_date_utc || '' }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          target = os.environ.get("WINNERS_DATE_UTC")
          details = f"winners_date_utc={target}" if target else "winners_date_utc=(default)"
          payload = {
              "content": (
                  f"⚠️ Workflow failed: {os.environ['WORKFLOW_NAME']} / {os.environ['JOB_NAME']}\n"
                  f"{details}\n"
                  f"Run: {os.environ['RUN_URL']}"
              )
          }
          request = urllib.request.Request(
              os.environ["DISCORD_FAILURE_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(request).read()
          PY
