name: Gaming Library Manage

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "add | rename | assign | unassign | set_status | archive | unarchive"
        required: true
        type: choice
        options:
          - add
          - rename
          - assign
          - unassign
          - set_status
          - archive
          - unarchive
      canonical_name:
        description: "Canonical game name"
        required: false
        type: string
      url:
        description: "Source URL"
        required: false
        type: string
      source_type:
        description: "Optional source type"
        required: false
        type: string
      source_section:
        description: "Optional source section"
        required: false
        type: string
      source_caption:
        description: "Optional original caption/description"
        required: false
        type: string
      identity_key:
        description: "Optional explicit identity key"
        required: false
        type: string
      user_ids:
        description: "Comma-separated Discord user IDs"
        required: false
        type: string
      status:
        description: "active | paused | dropped"
        required: false
        default: active
        type: choice
        options:
          - active
          - paused
          - dropped
      archive:
        description: "Optional boolean override for add"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: gaming-library-state
  cancel-in-progress: false

jobs:
  run-gaming-library-manage:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Apply manual gaming library operation
        env:
          PYTHONPATH: .
        run: |
          python scripts/manage_gaming_library.py \
            --operation "${{ inputs.operation }}" \
            --canonical-name "${{ inputs.canonical_name }}" \
            --url "${{ inputs.url }}" \
            --source-type "${{ inputs.source_type }}" \
            --source-section "${{ inputs.source_section }}" \
            --source-caption "${{ inputs.source_caption }}" \
            --identity-key "${{ inputs.identity_key }}" \
            --user-ids "${{ inputs.user_ids }}" \
            --status "${{ inputs.status }}" \
            --archive "${{ inputs.archive }}"

      - name: Save managed gaming library state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f gaming_library.json ]; then git add gaming_library.json; fi

          if ! git diff --cached --quiet; then
            git commit -m "Manage gaming library state"
            git stash --include-untracked || true
            git pull --rebase origin main
            git stash pop || true
          fi
          git push

      - name: Notify Discord health monitor on failure
        if: ${{ failure() && env.DISCORD_HEALTH_MONITOR_WEBHOOK_URL != '' }}
        env:
          DISCORD_HEALTH_MONITOR_WEBHOOK_URL: ${{ secrets.DISCORD_HEALTH_MONITOR_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.workflow }}
          JOB_NAME: run-gaming-library-manage
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OPERATION: ${{ inputs.operation }}
          CANONICAL_NAME: ${{ inputs.canonical_name || '' }}
        run: |
          payload="$(python - <<'PY'
          import json
          import os

          operation = os.environ.get("OPERATION", "(unknown)")
          canonical_name = os.environ.get("CANONICAL_NAME") or "(none)"
          print(json.dumps({
              "content": (
                  "🔴 XiannGPT Bot Failure\n\n"
                  f"Workflow: {os.environ['WORKFLOW_NAME']}\n"
                  f"Job: {os.environ['JOB_NAME']}\n"
                  "Status: failed\n"
                  f"Context: operation={operation}, canonical_name={canonical_name}\n"
                  f"Run: {os.environ['RUN_URL']}"
              )
          }))
          PY
          )"

          response_file="$(mktemp)"
          http_status="$(curl --silent --show-error \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            --header "Content-Type: application/json" \
            --header "User-Agent: steam-discord-free-games-health-monitor/1.0" \
            --data "${payload}" \
            --request POST \
            "${DISCORD_HEALTH_MONITOR_WEBHOOK_URL}")"

          if [[ "${http_status}" =~ ^2[0-9][0-9]$ ]]; then
            echo "Discord webhook POST succeeded: HTTP ${http_status}"
          else
            echo "Discord webhook POST failed: HTTP ${http_status}" >&2
            if [[ -s "${response_file}" ]]; then
              cat "${response_file}" >&2
            fi
            rm -f "${response_file}"
            exit 1
          fi

          rm -f "${response_file}"
