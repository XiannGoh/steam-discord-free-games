name: Gaming Library Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:
  run-gaming-library-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Sync gaming library from Discord reactions
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python scripts/sync_gaming_library.py

      - name: Save synced gaming library state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f gaming_library.json ]; then git add gaming_library.json; fi

          if ! git diff --cached --quiet; then
            git commit -m "Sync gaming library state"
            git pull --rebase origin main
          fi
          git push
