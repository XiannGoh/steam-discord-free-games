name: Gaming Library Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  run-gaming-library-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Sync gaming library from Discord reactions
        env:
          PYTHONPATH: .
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python scripts/sync_gaming_library.py

      - name: Save synced gaming library state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f gaming_library.json ]; then git add gaming_library.json; fi

          if ! git diff --cached --quiet; then
            git commit -m "Sync gaming library state"
            git stash --include-untracked || true
            git pull --rebase origin main
            git stash pop || true
          fi
          git push

      - name: Notify Discord health monitor on failure
        if: ${{ failure() && env.DISCORD_HEALTH_MONITOR_WEBHOOK_URL != '' }}
        env:
          DISCORD_HEALTH_MONITOR_WEBHOOK_URL: ${{ secrets.DISCORD_HEALTH_MONITOR_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.workflow }}
          JOB_NAME: run-gaming-library-sync
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload="$(python - <<'PY'
          import json
          import os

          print(json.dumps({
              "content": (
                  "🔴 XiannGPT Bot Failure\n\n"
                  f"Workflow: {os.environ['WORKFLOW_NAME']}\n"
                  f"Job: {os.environ['JOB_NAME']}\n"
                  "Status: failed\n"
                  f"Run: {os.environ['RUN_URL']}"
              )
          }))
          PY
          )"

          response_file="$(mktemp)"
          http_status="$(curl --silent --show-error \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            --header "Content-Type: application/json" \
            --header "User-Agent: steam-discord-free-games-health-monitor/1.0" \
            --data "${payload}" \
            --request POST \
            "${DISCORD_HEALTH_MONITOR_WEBHOOK_URL}")"

          if [[ "${http_status}" =~ ^2[0-9][0-9]$ ]]; then
            echo "Discord webhook POST succeeded: HTTP ${http_status}"
          else
            echo "Discord webhook POST failed: HTTP ${http_status}" >&2
            if [[ -s "${response_file}" ]]; then
              cat "${response_file}" >&2
            fi
            rm -f "${response_file}"
            exit 1
          fi

          rm -f "${response_file}"
