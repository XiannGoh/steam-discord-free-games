name: Weekly Scheduling Bot

on:
  workflow_dispatch:
    inputs:
      schedule_week_start:
        description: 'Optional Monday date (YYYY-MM-DD) to target instead of next week'
        required: false
        type: string
  schedule:
    - cron: '0 13 * * 6'

permissions:
  contents: write

jobs:
  post-weekly-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Post weekly availability
        env:
          DISCORD_SCHEDULING_BOT_TOKEN: ${{ secrets.DISCORD_SCHEDULING_BOT_TOKEN }}
          DISCORD_SCHEDULING_CHANNEL_ID: ${{ secrets.DISCORD_SCHEDULING_CHANNEL_ID }}
          SCHEDULE_WEEK_START: ${{ inputs.schedule_week_start }}
        run: python scripts/post_weekly_availability.py

      - name: Commit weekly schedule state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scheduling/weekly_schedule_messages.json

          if git diff --cached --quiet; then
            echo "No weekly schedule state changes to commit"
            exit 0
          fi

          git commit -m "chore: update weekly schedule message state"
          git push

      - name: Notify Discord on failure (optional)
        if: ${{ failure() && secrets.DISCORD_FAILURE_WEBHOOK_URL != '' }}
        env:
          DISCORD_FAILURE_WEBHOOK_URL: ${{ secrets.DISCORD_FAILURE_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.workflow }}
          JOB_NAME: post-weekly-availability
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TARGET_DATE: ${{ inputs.schedule_week_start || '' }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          target = os.environ.get("TARGET_DATE")
          details = f"target_week_start={target}" if target else "target_week_start=(default)"
          payload = {
              "content": (
                  f"⚠️ Workflow failed: {os.environ['WORKFLOW_NAME']} / {os.environ['JOB_NAME']}\n"
                  f"{details}\n"
                  f"Run: {os.environ['RUN_URL']}"
              )
          }
          request = urllib.request.Request(
              os.environ["DISCORD_FAILURE_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(request).read()
          PY
