name: Weekly Scheduling Bot

on:
  workflow_dispatch:
    inputs:
      schedule_week_start:
        description: 'Optional Monday date (YYYY-MM-DD) to target instead of next week'
        required: false
        type: string
  schedule:
    - cron: '0 13 * * 6'
    - cron: '10 13 * * 6'

permissions:
  contents: write

jobs:
  post-weekly-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post weekly availability
        env:
          PYTHONPATH: .
          DISCORD_SCHEDULING_BOT_TOKEN: ${{ secrets.DISCORD_SCHEDULING_BOT_TOKEN }}
          DISCORD_SCHEDULING_CHANNEL_ID: ${{ secrets.DISCORD_SCHEDULING_CHANNEL_ID }}
          SCHEDULE_WEEK_START: ${{ inputs.schedule_week_start }}
        run: python scripts/post_weekly_availability.py

      - name: Verify weekly schedule output
        continue-on-error: true
        env:
          PYTHONPATH: .
          DISCORD_SCHEDULING_BOT_TOKEN: ${{ secrets.DISCORD_SCHEDULING_BOT_TOKEN }}
          TARGET_WEEK_KEY: ${{ inputs.schedule_week_start }}
        run: python scripts/verify_weekly_schedule.py

      - name: Upload weekly schedule verification artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-schedule-verification-${{ github.run_id }}
          path: weekly_schedule_verification.json
          if-no-files-found: ignore

      - name: Commit weekly schedule state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scheduling/weekly_schedule_messages.json

          if git diff --cached --quiet; then
            echo "No weekly schedule state changes to commit"
            exit 0
          fi

          git commit -m "chore: update weekly schedule message state"
          git push

      - name: Notify Discord health monitor on failure
        if: ${{ failure() && env.DISCORD_HEALTH_MONITOR_WEBHOOK_URL != '' }}
        env:
          DISCORD_HEALTH_MONITOR_WEBHOOK_URL: ${{ secrets.DISCORD_HEALTH_MONITOR_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.workflow }}
          JOB_NAME: post-weekly-availability
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TARGET_DATE: ${{ inputs.schedule_week_start || '' }}
        run: |
          payload="$(python - <<'PY'
          import json
          import os

          target = os.environ.get("TARGET_DATE")
          details = f"target_week_start={target}" if target else "target_week_start=(default)"
          print(json.dumps({
              "content": (
                  "🔴 XiannGPT Bot Failure\n\n"
                  f"Workflow: {os.environ['WORKFLOW_NAME']}\n"
                  f"Job: {os.environ['JOB_NAME']}\n"
                  "Status: failed\n"
                  f"Context: {details}\n"
                  f"Run: {os.environ['RUN_URL']}"
              )
          }))
          PY
          )"

          response_file="$(mktemp)"
          http_status="$(curl --silent --show-error \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            --header "Content-Type: application/json" \
            --header "User-Agent: steam-discord-free-games-health-monitor/1.0" \
            --data "${payload}" \
            --request POST \
            "${DISCORD_HEALTH_MONITOR_WEBHOOK_URL}")"

          if [[ "${http_status}" =~ ^2[0-9][0-9]$ ]]; then
            echo "Discord webhook POST succeeded: HTTP ${http_status}"
          else
            echo "Discord webhook POST failed: HTTP ${http_status}" >&2
            if [[ -s "${response_file}" ]]; then
              cat "${response_file}" >&2
            fi
            rm -f "${response_file}"
            exit 1
          fi

          rm -f "${response_file}"
