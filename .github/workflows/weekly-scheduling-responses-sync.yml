name: Weekly Scheduling Responses Sync

on:
  workflow_dispatch:
    inputs:
      target_week_key:
        description: "Optional week key (e.g. 2026-04-13_to_2026-04-19)"
        required: false
        default: ""
      rebuild_summary_only:
        description: "Skip reaction fetch and only rebuild/repair summary"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Preview summary output and skip Discord posting"
        required: false
        type: boolean
        default: false
  schedule:
    # No-op touch: keep cron unchanged while forcing workflow re-evaluation.
    - cron: '0 */3 * * *'

permissions:
  contents: write

concurrency:
  group: weekly-scheduling-responses-sync
  cancel-in-progress: false

jobs:
  sync-weekly-responses:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Log sync context
        env:
          TARGET_WEEK_KEY: ${{ github.event.inputs.target_week_key || '' }}
          REBUILD_SUMMARY_ONLY: ${{ github.event.inputs.rebuild_summary_only || 'false' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          echo "Workflow trigger: ${{ github.event_name }}"
          echo "Selected TARGET_WEEK_KEY: ${TARGET_WEEK_KEY:-'(default latest)'}"
          echo "REBUILD_SUMMARY_ONLY: ${REBUILD_SUMMARY_ONLY}"
          echo "DRY_RUN: ${DRY_RUN}"
          echo "Current UTC time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Current New York time: $(TZ=America/New_York date '+%Y-%m-%d %I:%M:%S %p %Z')"

      - name: Sync weekly schedule responses
        env:
          PYTHONPATH: .
          DISCORD_SCHEDULING_BOT_TOKEN: ${{ secrets.DISCORD_SCHEDULING_BOT_TOKEN }}
          TARGET_WEEK_KEY: ${{ github.event.inputs.target_week_key || '' }}
          REBUILD_SUMMARY_ONLY: ${{ github.event.inputs.rebuild_summary_only || 'false' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/sync_weekly_schedule_responses.py

      - name: Log sync completion
        run: |
          echo "Sync step completed"
          echo "Post-sync UTC time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Post-sync New York time: $(TZ=America/New_York date '+%Y-%m-%d %I:%M:%S %p %Z')"

      - name: Commit weekly schedule responses
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scheduling/weekly_schedule_responses.json data/scheduling/weekly_schedule_summary.json data/scheduling/weekly_schedule_bot_outputs.json

          if git diff --cached --quiet; then
            echo "No weekly schedule response changes to commit"
            exit 0
          fi

          git commit -m "chore: update weekly schedule responses state"
          git push

      - name: Notify Discord health monitor on failure
        if: ${{ failure() && env.DISCORD_HEALTH_MONITOR_WEBHOOK_URL != '' }}
        env:
          DISCORD_HEALTH_MONITOR_WEBHOOK_URL: ${{ secrets.DISCORD_HEALTH_MONITOR_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.workflow }}
          JOB_NAME: sync-weekly-responses
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TARGET_WEEK_KEY: ${{ github.event.inputs.target_week_key || '' }}
          REBUILD_SUMMARY_ONLY: ${{ github.event.inputs.rebuild_summary_only || 'false' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          payload="$(python - <<'PY'
          import json
          import os

          print(json.dumps({
              "content": (
                  "🔴 XiannGPT Bot Failure\n\n"
                  f"Workflow: {os.environ['WORKFLOW_NAME']}\n"
                  f"Job: {os.environ['JOB_NAME']}\n"
                  "Status: failed\n"
                  "Context: "
                  f"target_week_key={os.environ.get('TARGET_WEEK_KEY') or '(default)'}, "
                  f"rebuild_summary_only={os.environ.get('REBUILD_SUMMARY_ONLY')}, "
                  f"dry_run={os.environ.get('DRY_RUN')}\n"
                  f"Run: {os.environ['RUN_URL']}"
              )
          }))
          PY
          )"

          response_file="$(mktemp)"
          http_status="$(curl --silent --show-error \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            --header "Content-Type: application/json" \
            --header "User-Agent: steam-discord-free-games-health-monitor/1.0" \
            --data "${payload}" \
            --request POST \
            "${DISCORD_HEALTH_MONITOR_WEBHOOK_URL}")"

          if [[ "${http_status}" =~ ^2[0-9][0-9]$ ]]; then
            echo "Discord webhook POST succeeded: HTTP ${http_status}"
          else
            echo "Discord webhook POST failed: HTTP ${http_status}" >&2
            if [[ -s "${response_file}" ]]; then
              cat "${response_file}" >&2
            fi
            rm -f "${response_file}"
            exit 1
          fi

          rm -f "${response_file}"
