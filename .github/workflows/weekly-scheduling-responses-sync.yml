name: Weekly Scheduling Responses Sync

on:
  workflow_dispatch:
    inputs:
      target_week_key:
        description: "Optional week key (e.g. 2026-04-13_to_2026-04-19)"
        required: false
        default: ""
      rebuild_summary_only:
        description: "Skip reaction fetch and only rebuild/repair summary"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Preview summary output and skip Discord posting"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 */3 * * *'

permissions:
  contents: write

concurrency:
  group: weekly-scheduling-responses-sync
  cancel-in-progress: false

jobs:
  sync-weekly-responses:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Sync weekly schedule responses
        env:
          DISCORD_SCHEDULING_BOT_TOKEN: ${{ secrets.DISCORD_SCHEDULING_BOT_TOKEN }}
          TARGET_WEEK_KEY: ${{ github.event.inputs.target_week_key || '' }}
          REBUILD_SUMMARY_ONLY: ${{ github.event.inputs.rebuild_summary_only || 'false' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/sync_weekly_schedule_responses.py

      - name: Commit weekly schedule responses
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scheduling/weekly_schedule_responses.json data/scheduling/weekly_schedule_summary.json data/scheduling/weekly_schedule_bot_outputs.json

          if git diff --cached --quiet; then
            echo "No weekly schedule response changes to commit"
            exit 0
          fi

          git commit -m "chore: update weekly schedule responses state"
          git push
